# ─── Application ────────────────────────────────────────────────────────────
spring.application.name=store

# Active profile: "dev" for local development, "prod" for Railway deployment
# Override this with: SPRING_PROFILES_ACTIVE=prod environment variable on Railway
spring.profiles.active=dev

# ─── Server ─────────────────────────────────────────────────────────────────
server.port=8080

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
# show-sql: logs every SQL query — useful for development, DISABLE in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Jackson (JSON serialization)
# Prevents "no properties" error for empty response bodies
spring.jackson.serialization.fail-on-empty-beans=false
# Formats LocalDateTime as ISO string in JSON responses
spring.jackson.serialization.write-dates-as-timestamps=false

# ─── Actuator (health check for Railway) ─────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
